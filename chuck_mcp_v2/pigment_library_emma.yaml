# chuck-mcp v3 / v5 — Emma Pigment Library (V1, uncalibrated catalog approximations)
# ===================================================================================
#
# Purpose
# -------
# Concrete pigment inventory that satisfies the 7-family taxonomy in
# `research/v3-construction/mokuhanga-rule-classifier/rule_table.yaml`.
#
# Each entry maps to a real artist pigment plausibly available in Reid's
# studio for Chuck Close "Emma 2002"-style portrait work. Lab values are
# catalog approximations sampled from manufacturer color charts (Holbein,
# Daniel Smith, Schmincke, traditional Japanese gansai catalogs). They are
# explicitly marked `uncalibrated_v1: true` and MUST be replaced with
# physically-measured swatches before any quantitative ΔE work.
#
# Schema per entry
# ----------------
#   <pigment_name>:
#     family: <one of light_yellow|pale_pink|pale_orange|pale_red|
#                     pale_blue|pale_green|warm_grey>
#     lab_values: [L*, a*, b*]   # D50 sRGB->Lab catalog approx
#     opacity_curve: [(dilution, opacity), ...]   # at least 2 points 0..1
#     source_note: <short citation describing where the lab values came from>
#     uncalibrated_v1: true       # hard-coded — V1 has no measured swatches
#     ci_pigment: <CI shorthand, e.g. PY3>
#     notes: <printmaker context, optional>
#
# Calibration plan (V2)
# ---------------------
# Replace each `lab_values` with a spectrophotometer reading of the
# pigment printed on Shiramine washi at three dilution ratios (1:0,
# 1:2, 1:5). Replace `opacity_curve` with measured K-M k/s ratios.
# Set `uncalibrated_v1: false` once a pigment is calibrated.

meta:
  version: "0.1.0"
  date: "2026-05-17"
  agent: "MOKUHANGA-PIGMENTS"
  swarm: "swarm-1778989256284-xvs2l5"
  applies_to: ["close_emma_2002", "chuck_close_portraits", "front_facing_portraits"]
  calibration_status: "uncalibrated_v1"
  family_taxonomy_source: "research/v3-construction/mokuhanga-rule-classifier/rule_table.yaml"
  expected_v1_dE_uncertainty: 6.0   # ±6 ΔE_76 from real swatches per family

