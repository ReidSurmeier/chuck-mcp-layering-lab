name: v23-mcp-ci

on:
  push:
    branches: [main, "pipeline/v23-**"]
  pull_request:
    paths:
      - "backend/mcp/**"
      - "backend/services/v23/**"
      - "backend/tests/v23/**"
      - ".github/workflows/v23.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check backend/mcp backend/services/v23 backend/tests/v23

  scaffold-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pytest pydantic
      - run: pytest backend/tests/v23/scaffold -x -q

  banned-terms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: WB-LANG-01 lint
        run: |
          ! grep -rEn 'recovered.{0,20}underlayer|true underlayer|actual block|ground.truth.*stack|detect.{0,20}underprint' \
              backend/mcp backend/services/v23 || (echo "banned term found" && exit 1)
